                `;
            },
            
            renderChannelPosts(posts) {
                if (posts.length === 0) {
                    return `<p style="text-align: center; color: var(--gray);">لا توجد منشورات بعد</p>`;
                }
                
                return `
                    <div class="posts-grid">
                        ${posts.map(post => `
                            <div class="post-card">
                                <h3 class="post-title">${post.title}</h3>
                                <div class="post-meta">📅 ${post.date}</div>
                                <div class="post-content">${post.description}</div>
                                <div class="post-stats">
                                    <span><i class="fas fa-eye"></i> ${post.views || 0}</span>
                                    <span><i class="fas fa-heart"></i> ${post.likes || 0}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },
            
            renderChannelLessons(lessons) {
                if (lessons.length === 0) {
                    return `<p style="text-align: center; color: var(--gray);">لا توجد دروس بعد</p>`;
                }
                
                return `
                    <div class="lessons-grid">
                        ${lessons.map(lesson => `
                            <div class="lesson-card">
                                <div class="lesson-header">📄</div>
                                <div class="lesson-content">
                                    <h3 class="lesson-title">${lesson.title}</h3>
                                    <p>${lesson.description}</p>
                                    <button class="lesson-btn view-btn" onclick="App.viewLesson(${lesson.id})">
                                        عرض
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },
            
            renderChannelAbout(teacher) {
                return `
                    <h3 style="color: var(--primary); margin-bottom: 1rem;">عن الأستاذ</h3>
                    <p style="margin-bottom: 1.5rem;">${teacher.bio}</p>
                    
                    <h3 style="color: var(--primary); margin-bottom: 1rem;">المواد</h3>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                        ${teacher.subjects?.map(s => `
                            <span class="stat-badge" style="background: var(--primary); color: white;">
                                ${this.getSubjectName(s)}
                            </span>
                        `).join('')}
                    </div>
                    
                    <h3 style="color: var(--primary); margin-bottom: 1rem;">المستويات</h3>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        ${teacher.levels?.map(l => `
                            <span class="stat-badge" style="background: var(--secondary); color: var(--primary);">
                                ${this.getLevelName(l)}
                            </span>
                        `).join('')}
                    </div>
                `;
            },
            
            showChannelTab(tab) {
                const teacher = this.teachers.find(t => t.id === this.viewingChannel);
                const teacherPosts = this.posts.filter(p => p.teacherId === teacher.id);
                const teacherLessons = this.lessons.filter(l => l.teacherId === teacher.id);
                
                document.querySelectorAll('.channel-tab').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                
                let content = '';
                if (tab === 'posts') {
                    content = this.renderChannelPosts(teacherPosts);
                } else if (tab === 'lessons') {
                    content = this.renderChannelLessons(teacherLessons);
                } else if (tab === 'about') {
                    content = this.renderChannelAbout(teacher);
                }
                
                document.getElementById('channelContent').innerHTML = content;
            },
            
            // ========== تفاعلات التلميذ ==========
            toggleFollow(teacherId) {
                const student = this.students.find(s => s.id === this.currentUser.id);
                const teacher = this.teachers.find(t => t.id === teacherId);
                
                if (!student.following) student.following = [];
                
                if (student.following.includes(teacherId)) {
                    student.following = student.following.filter(id => id !== teacherId);
                    teacher.followers = teacher.followers?.filter(id => id !== student.id) || [];
                    this.toast('تم إلغاء المتابعة', 'info');
                } else {
                    student.following.push(teacherId);
                    if (!teacher.followers) teacher.followers = [];
                    teacher.followers.push(student.id);
                    student.points += 10;
                    this.toast('تمت المتابعة +10 نقاط');
                }
                
                this.saveAll();
                
                if (this.viewingChannel === teacherId) {
                    this.viewTeacherChannel(teacherId);
                } else {
                    this.renderStudentDashboard();
                }
            },
            
            toggleSaveLesson(lessonId) {
                const student = this.students.find(s => s.id === this.currentUser.id);
                
                if (!student.savedLessons) student.savedLessons = [];
                
                if (student.savedLessons.includes(lessonId)) {
                    student.savedLessons = student.savedLessons.filter(id => id !== lessonId);
                    this.toast('تم إزالة الدرس', 'info');
                } else {
                    student.savedLessons.push(lessonId);
                    student.points += 5;
                    this.toast('تم حفظ الدرس +5 نقاط');
                }
                
                this.saveAll();
                this.renderStudentDashboard();
            },
            
            viewLesson(lessonId) {
                const lesson = this.lessons.find(l => l.id === lessonId);
                lesson.views += 1;
                this.saveAll();
                
                this.showModal(`
                    <h2 style="color: var(--primary);">${lesson.title}</h2>
                    <p style="margin: 1rem 0;">${lesson.description}</p>
                    <div style="background: var(--light); padding: 1rem; border-radius: var(--radius-md);">
                        <p><strong>الأستاذ:</strong> ${lesson.teacherName}</p>
                        <p><strong>المستوى:</strong> ${this.getLevelName(lesson.level)}</p>
                        <p><strong>المشاهدات:</strong> ${lesson.views}</p>
                    </div>
                `);
            },
            
            // ========== نماذج الإضافة ==========
            showAddPostForm() {
                this.showModal(`
                    <h2 style="color: var(--primary); margin-bottom: 1.5rem;">إضافة منشور جديد</h2>
                    <div class="form-group">
                        <label>عنوان المنشور</label>
                        <input type="text" id="postTitle" placeholder="أدخل عنوان المنشور">
                    </div>
                    <div class="form-group">
                        <label>محتوى المنشور</label>
                        <textarea id="postDesc" rows="5" placeholder="أدخل محتوى المنشور"></textarea>
                    </div>
                    <button class="submit-btn" onclick="App.addNewPost()">نشر</button>
                `);
            },
            
            addNewPost() {
                const title = document.getElementById('postTitle').value;
                const desc = document.getElementById('postDesc').value;
                
                if (!title || !desc) {
                    this.toast('الرجاء ملء جميع الحقول', 'error');
                    return;
                }
                
                const teacher = this.teachers.find(t => t.id === this.currentUser.id);
                
                const newPost = {
                    id: Date.now(),
                    teacherId: teacher.id,
                    teacherName: teacher.name,
                    type: 'text',
                    title: title,
                    description: desc,
                    date: new Date().toISOString().split('T')[0],
                    views: 0,
                    likes: 0
                };
                
                this.posts.push(newPost);
                this.saveAll();
                this.closeModal();
                this.viewTeacherChannel(teacher.id);
                this.toast('✅ تم نشر المنشور');
            },
            
            showAddLessonForm() {
                this.showModal(`
                    <h2 style="color: var(--primary); margin-bottom: 1.5rem;">إضافة درس جديد</h2>
                    <div class="form-group">
                        <label>عنوان الدرس</label>
                        <input type="text" id="lessonTitle" placeholder="أدخل عنوان الدرس">
                    </div>
                    <div class="form-group">
                        <label>وصف الدرس</label>
                        <textarea id="lessonDesc" rows="5" placeholder="أدخل وصف الدرس"></textarea>
                    </div>
                    <div class="form-group">
                        <label>المستوى</label>
                        <select id="lessonLevel">
                            <option value="bac1">الأولى باكالوريا</option>
                            <option value="bac2">الثانية باكالوريا</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>المادة</label>
                        <select id="lessonSubject">
                            <option value="math">الرياضيات</option>
                            <option value="physique">الفيزياء</option>
                        </select>
                    </div>
                    <button class="submit-btn" onclick="App.addNewLesson()">نشر</button>
                `);
            },
            
            addNewLesson() {
                const title = document.getElementById('lessonTitle').value;
                const desc = document.getElementById('lessonDesc').value;
                const level = document.getElementById('lessonLevel').value;
                const subject = document.getElementById('lessonSubject').value;
                
                if (!title || !desc) {
                    this.toast('الرجاء ملء جميع الحقول', 'error');
                    return;
                }
                
                const teacher = this.teachers.find(t => t.id === this.currentUser.id);
                
                const newLesson = {
                    id: Date.now(),
                    title: title,
                    description: desc,
                    level: level,
                    subject: subject,
                    teacherId: teacher.id,
                    teacherName: teacher.name,
                    date: new Date().toISOString().split('T')[0],
                    views: 0,
                    downloads: 0
                };
                
                this.lessons.push(newLesson);
                this.saveAll();
                this.closeModal();
                this.viewTeacherChannel(teacher.id);
                this.toast('✅ تم نشر الدرس');
            },
            
            // ========== لوحة تحكم الأستاذ ==========
            renderTeacherDashboard() {
                const teacher = this.teachers.find(t => t.id === this.currentUser.id);
                
                const teacherLessons = this.lessons.filter(l => l.teacherId === teacher.id);
                const teacherPosts = this.posts.filter(p => p.teacherId === teacher.id);
                
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = `
                    <div class="welcome-card">
                        <h1 class="welcome-title">مرحباً بك أ. ${teacher.name} 👨‍🏫</h1>
                        <p>${teacher.bio}</p>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-content">
                                <div class="stat-value">${teacher.followers?.length || 0}</div>
                                <div class="stat-label">متابع</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-newspaper"></i></div>
                            <div class="stat-content">
                                <div class="stat-value">${teacherPosts.length}</div>
                                <div class="stat-label">منشور</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-book"></i></div>
                            <div class="stat-content">
                                <div class="stat-value">${teacherLessons.length}</div>
                                <div class="stat-label">درس</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-star"></i></div>
                            <div class="stat-content">
                                <div class="stat-value">${teacher.rating}</div>
                                <div class="stat-label">تقييم</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="background: rgba(255,255,255,0.95); padding: 2rem; border-radius: var(--radius-xl);">
                        <h2 style="color: var(--primary); margin-bottom: 1rem;">إجراءات سريعة</h2>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                            <button class="nav-btn" style="background: var(--primary); color: white;" onclick="App.viewTeacherChannel(${teacher.id})">
                                <i class="fas fa-eye"></i> عرض قناتي
                            </button>
                            <button class="nav-btn" style="background: var(--secondary); color: var(--primary);" onclick="App.showAddPostForm()">
                                <i class="fas fa-plus"></i> إضافة منشور
                            </button>
                            <button class="nav-btn" style="background: var(--secondary); color: var(--primary);" onclick="App.showAddLessonForm()">
                                <i class="fas fa-book"></i> إضافة درس
                            </button>
                        </div>
                    </div>
                `;
            },
            
            // ========== المصادقة ==========
            showAuthModal() {
                this.showModal(`
                    <h2 style="color: var(--primary); text-align: center; margin-bottom: 1.5rem;">مرحباً بك في تعلّم.ما</h2>
                    
                    <div class="user-type-selector">
                        <button class="user-type-btn ${this.selectedUserType === 'student' ? 'active' : ''}" 
                            onclick="App.selectUserType('student')">
                            <i class="fas fa-user-graduate"></i> تلميذ
                        </button>
                        <button class="user-type-btn ${this.selectedUserType === 'teacher' ? 'active' : ''}" 
                            onclick="App.selectUserType('teacher')">
                            <i class="fas fa-chalkboard-teacher"></i> أستاذ
                        </button>
                    </div>
                    
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="كلمة السر">
                    </div>
                    
                    <button class="submit-btn" onclick="App.handleLogin()">دخول</button>
                    <button class="nav-btn" style="width:100%; margin-top:1rem;" onclick="App.showRegisterForm()">تسجيل جديد</button>
                `);
            },
            
            showRegisterForm() {
                this.showModal(`
                    <h2 style="color: var(--primary); text-align: center; margin-bottom: 1.5rem;">تسجيل جديد</h2>
                    
                    <div class="form-group">
                        <input type="text" id="regName" placeholder="الاسم الكامل">
                    </div>
                    <div class="form-group">
                        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                    </div>
                    <div class="form-group">
                        <input type="password" id="regPassword" placeholder="كلمة السر">
                    </div>
                    
                    ${this.selectedUserType === 'teacher' ? `
                        <div class="form-group">
                            <input type="text" id="regSpecialty" placeholder="الاختصاص">
                        </div>
                        <div class="form-group">
                            <textarea id="regBio" rows="3" placeholder="نبذة عنك"></textarea>
                        </div>
                    ` : ''}
                    
                    <button class="submit-btn" onclick="App.handleRegister()">تسجيل</button>
                `);
            },
            
            selectUserType(type) {
                this.selectedUserType = type;
                document.querySelectorAll('.user-type-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            },
            
            handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                let user;
                if (this.selectedUserType === 'teacher') {
                    user = this.teachers.find(t => t.email === email && t.password === password);
                } else {
                    user = this.students.find(s => s.email === email && s.password === password);
                }
                
                if (user) {
                    this.currentUser = {
                        id: user.id,
                        name: user.name,
                        type: this.selectedUserType
                    };
                    this.saveAll();
                    this.closeModal();
                    this.render();
                    this.toast('مرحباً بك');
                } else {
                    this.toast('البريد الإلكتروني أو كلمة السر غير صحيحة', 'error');
                }
            },
            
            handleRegister() {
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                
                if (!name || !email || !password) {
                    this.toast('الرجاء ملء جميع الحقول', 'error');
                    return;
                }
                
                if (this.selectedUserType === 'teacher') {
                    if (this.teachers.find(t => t.email === email)) {
                        this.toast('البريد الإلكتروني موجود مسبقاً', 'error');
                        return;
                    }
                    
                    const specialty = document.getElementById('regSpecialty')?.value || 'أستاذ';
                    const bio = document.getElementById('regBio')?.value || 'أستاذ جديد';
                    
                    const newTeacher = {
                        id: this.teachers.length + 1,
                        name: name,
                        email: email,
                        password: password,
                        specialty: specialty,
                        bio: bio,
                        avatar: this.getRandomAvatar(),
                        rating: 0,
                        followers: [],
                        subjects: [],
                        levels: []
                    };
                    
                    this.teachers.push(newTeacher);
                    this.currentUser = { id: newTeacher.id, name: name, type: 'teacher' };
                    
                } else {
                    if (this.students.find(s => s.email === email)) {
                        this.toast('البريد الإلكتروني موجود مسبقاً', 'error');
                        return;
                    }
                    
                    const newStudent = {
                        id: this.students.length + 1,
                        name: name,
                        email: email,
                        password: password,
                        level: 'bac1',
                        following: [],
                        savedLessons: [],
                        points: 0,
                        streak: 0
                    };
                    
                    this.students.push(newStudent);
                    this.currentUser = { id: newStudent.id, name: name, type: 'student' };
                }
                
                this.saveAll();
                this.closeModal();
                this.render();
                this.toast('تم التسجيل بنجاح');
            },
            
            logout() {
                this.currentUser = null;
                this.viewingChannel = null;
                localStorage.removeItem('currentUser');
                this.render();
                this.toast('تم تسجيل الخروج');
            },
            
            goHome() {
                this.viewingChannel = null;
                this.render();
            },
            
            // ========== تهيئة التطبيق ==========
            init() {
                this.loadData();
                this.initSampleData();
                this.render();
                
                // تهيئة الخلفية المتحركة
                this.initAnimatedBg();
                
                window.onclick = (event) => {
                    const modal = document.getElementById('modal');
                    if (event.target === modal) this.closeModal();
                };
            },
            
            initAnimatedBg() {
                const bg = document.getElementById('animatedBg');
                for (let i = 0; i < 20; i++) {
                    const span = document.createElement('span');
                    span.style.left = Math.random() * 100 + '%';
                    span.style.width = Math.random() * 20 + 5 + 'px';
                    span.style.height = span.style.width;
                    span.style.animationDuration = Math.random() * 20 + 10 + 's';
                    span.style.animationDelay = Math.random() * 10 + 's';
                    bg.appendChild(span);
                }
            }
        };

        // ========== تشغيل التطبيق ==========
        App.init();
    </script>
</body>
</html>
