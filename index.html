        }

        body {

        /* خلفية متحركة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* شريط التحميل */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #1e3c72);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
            z-index: 9999;

        .channel-btn-secondary {

            color: #1e3c72;

        .channel-tabs {

            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;

        .channel-tab-btn {
            padding: 0.8rem 2rem;

            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 50px;
            cursor: pointer;

            color: #1e3c72;
        }

        .channel-content {
            background: white;
            padding: 2rem;
            border-radius: 30px;

        /* النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 800px;
            padding: 2rem;
            border-radius: 30px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            left: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* إشعارات */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
        }

        .toast {
            background: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            margin-top: 0.5rem;
            border-right: 4px solid #28a745;
        }

        /* التجاوب */
        @media (max-width: 768px) {
            .teacher-dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

            toast.textContent = message;
            document.getElementById('toastContainer').appendChild(toast);

        function searchContent() {
            const searchInput = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const levelFilter = document.getElementById('levelFilter')?.value || '';
            const subjectFilter = document.getElementById('subjectFilter')?.value || '';

            filters = { search: searchInput, level: levelFilter, subject: subjectFilter };

            searchResults.teachers = teachers.filter(teacher => {
                let matches = true;
                if (searchInput) {
                    matches = matches && (teacher.name.toLowerCase().includes(searchInput) ||
                        teacher.specialty.toLowerCase().includes(searchInput));
                }
                if (levelFilter) {
                    matches = matches && teacher.levels?.includes(levelFilter);
                }
                if (subjectFilter) {
                    matches = matches && teacher.subjects?.includes(subjectFilter);
                }
                return matches;
            });

            searchResults.lessons = lessons.filter(lesson => {
                let matches = true;
                if (searchInput) {
                    matches = matches && lesson.title.toLowerCase().includes(searchInput);
                }
                if (levelFilter) {
                    matches = matches && lesson.level === levelFilter;
                }
                if (subjectFilter) {
                    matches = matches && lesson.subject === subjectFilter;
                }
                return matches;
            });

            renderCurrentTab();
        }

        function toggleFollow(teacherId) {
            const student = students.find(s => s.id === currentUser.id);
            const teacher = teachers.find(t => t.id === teacherId);

            if (!student.following) student.following = [];

            if (student.following.includes(teacherId)) {
                student.following = student.following.filter(id => id !== teacherId);
                if (teacher.followers) {
                    teacher.followers = teacher.followers.filter(id => id !== student.id);
                }
                showToast('تم إلغاء المتابعة', 'info');
            } else {
                student.following.push(teacherId);
                if (!teacher.followers) teacher.followers = [];
                teacher.followers.push(student.id);
                student.points = (student.points || 0) + 10;
                showToast('تمت المتابعة +10 نقاط', 'success');
            }

            saveAll();
            renderCurrentTab();
        }

        function toggleSaveLesson(lessonId) {
            const student = students.find(s => s.id === currentUser.id);
            
            if (!student.savedLessons) student.savedLessons = [];

            if (student.savedLessons.includes(lessonId)) {
                student.savedLessons = student.savedLessons.filter(id => id !== lessonId);
                showToast('تم إزالة الدرس', 'info');
            } else {
                student.savedLessons.push(lessonId);
                student.points = (student.points || 0) + 5;
                showToast('تم حفظ الدرس +5 نقاط', 'success');
            }

            saveAll();
            renderCurrentTab();
        }

        function viewTeacherLessons(teacherId) {
            renderChannelPage(teacherId);
        }

        // ========== المصادقة ==========
        function showAuthModal() {
            showModal(`
                <h2 style="text-align: center;">مرحباً بك في تعلّم.ما</h2>
                <div style="display: flex; gap: 1rem; margin: 1rem 0;">
                    <button class="nav-btn" style="flex:1;" onclick="selectUserType('student')">تلميذ</button>
                    <button class="nav-btn" style="flex:1;" onclick="selectUserType('teacher')">أستاذ</button>
                </div>
                <div class="form-group">
                    <input type="email" id="loginEmail" class="search-input" placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" class="search-input" placeholder="كلمة السر">
                </div>
                <button class="submit-btn" onclick="handleLogin()">دخول</button>
                <button class="nav-btn" style="width:100%; margin-top:1rem;" onclick="showRegisterForm()">تسجيل جديد</button>
            `);
        }

        function showRegisterForm() {
            showModal(`
                <h2 style="text-align: center;">تسجيل جديد</h2>
                <div class="form-group">
                    <input type="text" id="regName" class="search-input" placeholder="الاسم الكامل">
                </div>
                <div class="form-group">
                    <input type="email" id="regEmail" class="search-input" placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <input type="password" id="regPassword" class="search-input" placeholder="كلمة السر">
                </div>
                <button class="submit-btn" onclick="handleRegister()">تسجيل</button>
            `);
        }

        function selectUserType(type) {
            window.userType = type;
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const type = window.userType || 'student';

            let user;
            if (type === 'teacher') {
                user = teachers.find(t => t.email === email && t.password === password);
            } else {
                user = students.find(s => s.email === email && s.password === password);
            }

            if (user) {
                currentUser = {
                    id: user.id,
                    name: user.name,
                    type: type
                };
                saveAll();
                closeModal();
                renderUI();
                showToast('مرحباً بك');
            } else {
                showToast('خطأ في الدخول', 'error');
            }
        }

        function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password) {
                showToast('الرجاء ملء جميع الحقول', 'error');
                return;
            }

            const type = window.userType || 'student';

            if (type === 'teacher') {
                if (teachers.find(t => t.email === email)) {
                    showToast('البريد موجود مسبقاً', 'error');
                    return;
                }

                const newTeacher = {
                    id: teachers.length + 1,
                    name: name,
                    email: email,
                    password: password,
                    specialty: 'أستاذ',
                    bio: 'أستاذ جديد',
                    avatar: getRandomAvatar(),
                    rating: 0,
                    followers: [],
                    subjects: [],
                    levels: []
                };

                teachers.push(newTeacher);
                currentUser = { id: newTeacher.id, name: name, type: 'teacher' };
                
            } else {
                if (students.find(s => s.email === email)) {
                    showToast('البريد موجود مسبقاً', 'error');
                    return;
                }

                const newStudent = {
                    id: students.length + 1,
                    name: name,
                    email: email,
                    password: password,
                    level: 'bac1',
                    following: [],
                    savedLessons: [],
                    points: 0,
                    streak: 0
                };

                students.push(newStudent);
                currentUser = { id: newStudent.id, name: name, type: 'student' };
            }

            saveAll();
            closeModal();
            renderUI();
            showToast('تم التسجيل بنجاح');
        }

        function logout() {
            currentUser = null;
            viewingChannel = null;
            localStorage.removeItem('currentUser');
            renderUI();
        }

        function goHome() {
            viewingChannel = null;
            renderUI();
        }

        function initAnimatedBg() {
            const bg = document.getElementById('animatedBg');
            for (let i = 0; i < 20; i++) {
                const span = document.createElement('span');
                span.style.left = Math.random() * 100 + '%';
                span.style.width = Math.random() * 20 + 5 + 'px';
                span.style.height = span.style.width;
                span.style.animationDuration = Math.random() * 20 + 10 + 's';
                span.style.animationDelay = Math.random() * 10 + 's';
                bg.appendChild(span);
            }
        }

        // ========== تهيئة ==========
        initAnimatedBg();
        renderUI();

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) closeModal();
        };
    </script>
</body>
</html>
