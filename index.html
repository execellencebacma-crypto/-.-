<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلّم.ما - المنصة التعليمية المغربية المتكاملة</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- AOS للأنيميشن -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* ========== متغيرات متقدمة ========== */
        :root {
            --primary: #1e3c72;
            --primary-light: #2a5298;
            --primary-dark: #0f2b4f;
            --primary-gradient: linear-gradient(135deg, #1e3c72, #2a5298);
            
            --secondary: #ffd700;
            --secondary-light: #ffed4a;
            --secondary-dark: #e6b800;
            --secondary-gradient: linear-gradient(135deg, #ffd700, #ffed4a);
            
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            
            --dark: #343a40;
            --light: #f8f9fa;
            --light-dark: #e9ecef;
            --gray: #6c757d;
            --white: #ffffff;
            
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
            --shadow-xl: 0 12px 32px rgba(0,0,0,0.1);
            --shadow-2xl: 0 20px 48px rgba(0,0,0,0.15);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-2xl: 32px;
            --radius-full: 9999px;
            
            --transition: all 0.3s ease;
            
            --font-primary: 'Cairo', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* خلفية متحركة */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* شريط التحميل */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
            z-index: 9999;
        }

        .loading-bar.active {
            transform: scaleX(1);
        }

        /* الشريط العلوي */
        .navbar {
            background: rgba(30, 60, 114, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, white, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: white;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: var(--radius-full);
            color: white;
        }

        /* لوحة التحكم */
        .dashboard {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* بطاقة الترحيب */
        .welcome-card {
            background: linear-gradient(135deg, rgba(30,60,114,0.95), rgba(15,43,79,0.98));
            backdrop-filter: blur(10px);
            color: white;
            padding: 2.5rem;
            border-radius: var(--radius-2xl);
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .welcome-card::before {
            content: '📚';
            position: absolute;
            font-size: 10rem;
            opacity: 0.1;
            left: -30px;
            bottom: -30px;
            transform: rotate(-15deg);
        }

        .welcome-title {
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .welcome-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .welcome-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
        }

        /* شبكة الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-2xl);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }

        /* نظام البحث المتقدم */
        .search-section {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            margin-bottom: 2rem;
        }

        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-header h2 {
            color: var(--primary);
            font-size: 1.8rem;
        }

        .results-count {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: var(--radius-full);
            font-size: 1rem;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .search-input-group {
            position: relative;
        }

        .search-input-group i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.5rem;
            border: 2px solid var(--light-dark);
            border-radius: var(--radius-full);
            font-size: 1rem;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
        }

        .search-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: var(--radius-full);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        /* الفلاتر النشطة */
        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .filter-tag {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .filter-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* أقسام التلميذ */
        .student-tabs {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.8rem 2rem;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .tab-btn:hover,
        .tab-btn.active {
            background: var(--secondary);
            color: var(--primary);
        }

        /* شبكة الأساتذة */
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .teacher-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .teacher-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-2xl);
        }

        .teacher-header {
            height: 80px;
            background: var(--primary-gradient);
            position: relative;
        }

        .teacher-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            margin: -50px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 4px solid white;
            box-shadow: var(--shadow-lg);
        }

        .teacher-info {
            padding: 1.5rem;
            text-align: center;
        }

        .teacher-name {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .teacher-specialty {
            color: var(--secondary-dark);
            margin: 0.3rem 0;
        }

        .teacher-stats {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .stat-badge {
            background: var(--light);
            padding: 0.3rem 1rem;
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .follow-btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: var(--radius-full);
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .follow-btn.following {
            background: var(--success);
        }

        /* شبكة الدروس */
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .lesson-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }

        .lesson-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-2xl);
        }

        .lesson-header {
            height: 120px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .lesson-content {
            padding: 1.5rem;
        }

        .lesson-title {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .lesson-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .lesson-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
        }

        .view-btn {
            background: var(--primary);
            color: white;
        }

        .save-btn {
            background: var(--secondary);
            color: var(--primary);
        }

        .save-btn.saved {
            background: var(--success);
            color: white;
        }

        /* صفحة القناة */
        .channel-page {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--shadow-2xl);
        }

        .channel-cover {
            height: 200px;
            background: var(--primary-gradient);
            position: relative;
        }

        .channel-avatar-large {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            position: absolute;
            bottom: -60px;
            right: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border: 4px solid var(--secondary);
            box-shadow: var(--shadow-2xl);
        }

        .channel-info {
            padding: 4rem 2rem 2rem;
        }

        .channel-name {
            font-size: 2rem;
            color: var(--primary);
        }

        .channel-meta {
            display: flex;
            gap: 2rem;
            margin: 1rem 0;
        }

        .channel-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        /* النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            border-radius: var(--radius-2xl);
            position: relative;
        }

        .modal-close {
            position: absolute;
            left: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--light-dark);
            border-radius: var(--radius-md);
            font-size: 1rem;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* إشعارات */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
        }

        .toast {
            background: white;
            padding: 1rem 2rem;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-2xl);
            margin-top: 0.5rem;
            border-right: 4px solid var(--success);
        }

        /* حالات عدم وجود بيانات */
        .no-data {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.1);
            border-radius: var(--radius-xl);
            color: white;
        }

        .no-data i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* اختيار نوع المستخدم */
        .user-type-selector {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }

        .user-type-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        .user-type-btn.active {
            background: var(--primary);
            color: white;
        }

        /* التجاوب */
        @media (max-width: 768px) {
            .search-grid {
                grid-template-columns: 1fr;
            }
            
            .student-tabs {
                flex-direction: column;
            }
            
            .tab-btn {
                width: 100%;
            }
            
            .channel-avatar-large {
                right: 50%;
                transform: translateX(50%);
            }
            
            .channel-info {
                text-align: center;
            }
            
            .channel-meta {
                justify-content: center;
            }
            
            .channel-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="animated-bg" id="animatedBg"></div>

    <!-- شريط التحميل -->
    <div class="loading-bar" id="loadingBar"></div>

    <!-- الشريط العلوي -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="App.goHome()">تعلّم<span>.ما</span></div>
            <div class="nav-menu" id="navMenu"></div>
        </div>
    </nav>

    <!-- لوحة التحكم -->
    <div class="dashboard" id="dashboard"></div>

    <!-- حاوية الإشعارات -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- النافذة المنبثقة -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="App.closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // ========== إعدادات متقدمة ==========
        const CONFIG = {
            APP_NAME: 'تعلّم.ما',
            APP_VERSION: '3.0.0',
            DEFAULT_AVATARS: ['👨‍🏫', '👩‍🏫', '📚', '🔬', '📐', '⚡', '📝', '🌍', '🧪', '🎓'],
            TOAST_DURATION: 3000
        };

        // ========== التطبيق المتكامل ==========
        const App = {
            // ========== البيانات الأساسية مع العدد الدقيق ==========
            teachers: [],
            students: [],
            lessons: [],
            posts: [],
            currentUser: null,
            viewingChannel: null,
            selectedUserType: 'student',
            filters: {
                search: '',
                level: '',
                subject: '',
                teacherName: ''
            },
            searchResults: {
                teachers: [],
                lessons: []
            },
            
            // ========== تحميل البيانات من localStorage ==========
            loadData() {
                this.teachers = JSON.parse(localStorage.getItem('teachers')) || [];
                this.students = JSON.parse(localStorage.getItem('students')) || [];
                this.lessons = JSON.parse(localStorage.getItem('lessons')) || [];
                this.posts = JSON.parse(localStorage.getItem('posts')) || [];
                this.currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
            },
            
            saveAll() {
                localStorage.setItem('teachers', JSON.stringify(this.teachers));
                localStorage.setItem('students', JSON.stringify(this.students));
                localStorage.setItem('lessons', JSON.stringify(this.lessons));
                localStorage.setItem('posts', JSON.stringify(this.posts));
                if (this.currentUser) {
                    localStorage.setItem('currentUser', JSON.stringify(this.currentUser));
                }
            },
            
            // ========== بيانات تجريبية (4 أساتذة، 2 تلاميذ) ==========
            initSampleData() {
                if (this.teachers.length === 0) {
                    this.teachers.push(
                        {
                            id: 1,
                            name: 'أحمد الفاسي',
                            email: 'ahmed@teacher.com',
                            password: '123456',
                            specialty: 'الرياضيات',
                            bio: 'أستاذ الرياضيات للبكالوريا - خبرة 15 سنة',
                            avatar: '📐',
                            rating: 4.8,
                            followers: [],
                            subjects: ['math'],
                            levels: ['bac1', 'bac2']
                        },
                        {
                            id: 2,
                            name: 'فاطمة المراكشي',
                            email: 'fatima@teacher.com',
                            password: '123456',
                            specialty: 'الفيزياء',
                            bio: 'دكتورة في الفيزياء النووية',
                            avatar: '⚡',
                            rating: 4.9,
                            followers: [],
                            subjects: ['physique'],
                            levels: ['bac1', 'bac2']
                        },
                        {
                            id: 3,
                            name: 'محمد البيضاوي',
                            email: 'mohamed@teacher.com',
                            password: '123456',
                            specialty: 'العربية',
                            bio: 'أستاذ اللغة العربية',
                            avatar: '📝',
                            rating: 4.7,
                            followers: [],
                            subjects: ['arabic'],
                            levels: ['tronc', 'bac1']
                        },
                        {
                            id: 4,
                            name: 'سعاد المغربية',
                            email: 'souad@teacher.com',
                            password: '123456',
                            specialty: 'الفلسفة',
                            bio: 'أستاذة الفلسفة',

            // ========== دوال مساعدة ==========
            toast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.style.borderRightColor = type === 'success' ? '#28a745' : '#dc3545';
                toast.textContent = message;
                document.getElementById('toastContainer').appendChild(toast);
                setTimeout(() => toast.remove(), CONFIG.TOAST_DURATION);
            },
            
            showModal(content) {
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('modal').style.display = 'flex';
            },
            
            closeModal() {
                document.getElementById('modal').style.display = 'none';

            getLevelName(level) {
                const levels = {
                    'premiere': 'الأولى إعدادي',
                    'deuxieme': 'الثانية إعدادي',
                    'troisieme': 'الثالثة إعدادي',
                    'tronc': 'جذع مشترك',
                    'bac1': 'الأولى باكالوريا',
                    'bac2': 'الثانية باكالوريا'
                };
                return levels[level] || level;
            },
            
            getSubjectName(subject) {
                const subjects = {
                    'math': 'الرياضيات',
                    'physique': 'الفيزياء',
                    'chimie': 'الكيمياء',
                    'svt': 'علوم الحياة',
                    'philosophy': 'الفلسفة',
                    'arabic': 'العربية',
                    'french': 'الفرنسية'
                };
                return subjects[subject] || subject;
            },
            
            getRandomAvatar() {
                return CONFIG.DEFAULT_AVATARS[Math.floor(Math.random() * CONFIG.DEFAULT_AVATARS.length)];
            },
            
            // ========== واجهة المستخدم ==========
            render() {
                this.updateNavMenu();
                
                if (!this.currentUser) {
                    this.showAuthModal();

            // ========== نظام البحث المتقدم ==========
            searchContent() {
                if (!this.currentUser || this.currentUser.type !== 'student') return;
                
                this.filters.search = document.getElementById('searchInput')?.value.toLowerCase() || '';
                this.filters.level = document.getElementById('levelFilter')?.value || '';
                this.filters.subject = document.getElementById('subjectFilter')?.value || '';
                this.filters.teacherName = document.getElementById('teacherFilter')?.value.toLowerCase() || '';
                
                // فلترة الأساتذة
                this.searchResults.teachers = this.teachers.filter(teacher => {
                    let matches = true;
                    
                    if (this.filters.search) {
                        matches = matches && (
                            teacher.name.toLowerCase().includes(this.filters.search) ||
                            teacher.specialty.toLowerCase().includes(this.filters.search)
                        );
                    }
                    
                    if (this.filters.level) {
                        matches = matches && teacher.levels?.includes(this.filters.level);
                    }
                    
                    if (this.filters.subject) {
                        matches = matches && teacher.subjects?.includes(this.filters.subject);
                    }
                    
                    if (this.filters.teacherName) {
                        matches = matches && teacher.name.toLowerCase().includes(this.filters.teacherName);
                    }
                    
                    return matches;
                });
                
                // فلترة الدروس
                this.searchResults.lessons = this.lessons.filter(lesson => {
                    let matches = true;
                    
                    if (this.filters.search) {
                        matches = matches && (
                            lesson.title.toLowerCase().includes(this.filters.search) ||
                            lesson.description.toLowerCase().includes(this.filters.search)
                        );
                    }
                    
                    if (this.filters.level) {
                        matches = matches && lesson.level === this.filters.level;
                    }
                    
                    if (this.filters.subject) {
                        matches = matches && lesson.subject === this.filters.subject;
                    }
                    
                    return matches;
                });
                
                const resultsCount = document.querySelector('.results-count');
                if (resultsCount) {
                    resultsCount.innerHTML = `${this.searchResults.teachers.length} أستاذ • ${this.searchResults.lessons.length} درس`;
                }
                
                this.showActiveFilters();
                this.renderCurrentTab();
            },
            
            showActiveFilters() {
                const container = document.getElementById('activeFilters');
                if (!container) return;
                
                let html = '';
                
                if (this.filters.search) {
                    html += `
                        <div class="filter-tag">
                            <i class="fas fa-search"></i> ${this.filters.search}
                            <button onclick="App.removeFilter('search')">&times;</button>
                        </div>
                    `;
                }
                
                if (this.filters.level) {
                    html += `
                        <div class="filter-tag">
                            <i class="fas fa-layer-group"></i> ${this.getLevelName(this.filters.level)}
                            <button onclick="App.removeFilter('level')">&times;</button>
                        </div>
                    `;
                }
                
                if (this.filters.subject) {
                    html += `
                        <div class="filter-tag">
                            <i class="fas fa-book"></i> ${this.getSubjectName(this.filters.subject)}
                            <button onclick="App.removeFilter('subject')">&times;</button>
                        </div>
                    `;
                }
                
                if (this.filters.teacherName) {
                    html += `
                        <div class="filter-tag">
                            <i class="fas fa-user"></i> ${this.filters.teacherName}
                            <button onclick="App.removeFilter('teacherName')">&times;</button>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
            },
            
            removeFilter(filter) {
                this.filters[filter] = '';
                document.getElementById('searchInput').value = '';
                document.getElementById('levelFilter').value = '';
                document.getElementById('subjectFilter').value = '';
                document.getElementById('teacherFilter').value = '';
                this.searchContent();
            },
            
            clearAllFilters() {
                this.filters = { search: '', level: '', subject: '', teacherName: '' };
                document.getElementById('searchInput').value = '';
                document.getElementById('levelFilter').value = '';
                document.getElementById('subjectFilter').value = '';
                document.getElementById('teacherFilter').value = '';
                this.searchContent();
            },

                                        <button class="follow-btn ${isFollowing ? 'following' : ''}"

                                        </button>
                                    </div>

                    </div>
                `;
            },
            
            renderFollowingTeachers() {
                const student = this.students.find(s => s.id === this.currentUser.id);
                const followingTeachers = this.teachers.filter(t => student.following?.includes(t.id));
                
                if (followingTeachers.length === 0) {
                    return `
                        <div class="no-data">
                            <i class="fas fa-heart"></i>
                            <h3>لم تتابع أي أستاذ بعد</h3>
                            <p>تابع الأساتذة لمشاهدة دروسهم</p>
                        </div>
                    `;

                return `

                                <div class="teacher-avatar">${teacher.avatar}</div>
                                <div class="teacher-info">
                                    <h3 class="teacher-name">${teacher.name}</h3>

                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },
            
            renderAllLessons() {

                if (lessonsToShow.length === 0) {
                    return `
                        <div class="no-data">

                            <h3>لا توجد دروس</h3>

                return `

                                                ${isSaved ? 'محفوظ' : 'حفظ'}

                                    </div>

                const student = this.students.find(s => s.id === this.currentUser.id);
                const savedLessons = this.lessons.filter(l => student.savedLessons?.includes(l.id));
                
                if (savedLessons.length === 0) {
                    return `
                        <div class="no-data">
                            <i class="fas fa-bookmark"></i>
                            <h3>لا توجد دروس محفوظة</h3>
                            <p>احفظ الدروس التي تهمك للعودة إليها</p>
                        </div>
                    `;
                }
                
                return `
                    <div class="lessons-grid">
                        ${savedLessons.map(lesson => `

                                    <h3 class="lesson-title">${lesson.title}</h3>

                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },
            
            showStudentTab(tab) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                
                let content = '';
                if (tab === 'teachers') {
                    content = this.renderAllTeachers();
                } else if (tab === 'following') {
                    content = this.renderFollowingTeachers();
                } else if (tab === 'lessons') {
                    content = this.renderAllLessons();
                } else if (tab === 'saved') {
                    content = this.renderSavedLessons();
                }
                
                document.getElementById('studentContent').innerHTML = content;
            },
            
            // ========== تفاعلات التلميذ ==========
            toggleFollow(teacherId) {
                const student = this.students.find(s => s.id === this.currentUser.id);
                const teacher = this.teachers.find(t => t.id === teacherId);
                
                if (!student.following) student.following = [];
                
                if (student.following.includes(teacherId)) {
                    student.following = student.following.filter(id => id !== teacherId);
                    teacher.followers = teacher.followers?.filter(id => id !== student.id) || [];
                    this.toast('تم إلغاء المتابعة', 'info');
                } else {
                    student.following.push(teacherId);
                    if (!teacher.followers) teacher.followers = [];
                    teacher.followers.push(student.id);
                    student.points += 10;
                    this.toast('تمت المتابعة +10 نقاط');
                }
                
                this.saveAll();
                
                if (this.viewingChannel === teacherId) {
                    this.viewTeacherChannel(teacherId);
                } else {
                    const activeTab = document.querySelector('.tab-btn.active')?.textContent || '';
                    if (activeTab.includes('أساتذتي')) {
                        this.showStudentTab('following');
                    } else {
                        this.showStudentTab('teachers');
                    }
                }
            },
            
            toggleSaveLesson(lessonId) {
                const student = this.students.find(s => s.id === this.currentUser.id);
                
                if (!student.savedLessons) student.savedLessons = [];
                
                if (student.savedLessons.includes(lessonId)) {
                    student.savedLessons = student.savedLessons.filter(id => id !== lessonId);
                    this.toast('تم إزالة الدرس', 'info');
                } else {
                    student.savedLessons.push(lessonId);
                    student.points += 5;
                    this.toast('تم حفظ الدرس +5 نقاط');
                }
                
                this.saveAll();
                
                const activeTab = document.querySelector('.tab-btn.active')?.textContent || '';
                if (activeTab.includes('محفوظاتي')) {
                    this.showStudentTab('saved');
                } else {
                    this.showStudentTab('lessons');
                }
            },
            
            viewLesson(lessonId) {
                const lesson = this.lessons.find(l => l.id === lessonId);
                lesson.views += 1;
                this.saveAll();
                
                this.showModal(`
                    <h2 style="color: var(--primary);">${lesson.title}</h2>
                    <p style="margin: 1rem 0;">${lesson.description}</p>
                    <p><strong>الأستاذ:</strong> ${lesson.teacherName}</p>
                    <p><strong>المشاهدات:</strong> ${lesson.views}</p>
                `);
            },
            
            // ========== صفحة قناة الأستاذ ==========
            viewTeacherChannel(teacherId) {
                this.viewingChannel = teacherId;
                const teacher = this.teachers.find(t => t.id === teacherId);
                
                const student = this.students.find(s => s.id === this.currentUser?.id);
                const isFollowing = student?.following?.includes(teacherId) || false;
                const teacherLessons = this.lessons.filter(l => l.teacherId === teacherId);
                
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = `
                    <div class="channel-page">
                        <div class="channel-cover">
                            <div class="channel-avatar-large">${teacher.avatar}</div>
                        </div>
                        
                        <div class="channel-info">
                            <h1 class="channel-name">${teacher.name}</h1>
                            <p>${teacher.specialty}</p>
                            <p>${teacher.bio}</p>
                            
                            <div class="channel-meta">
                                <div><strong>${teacher.followers?.length || 0}</strong> متابع</div>
                                <div><strong>${teacherLessons.length}</strong> درس</div>
                            </div>
                            
                            <div class="channel-actions">
                                ${this.currentUser?.type === 'student' ? `
                                    <button class="channel-btn channel-btn-primary" onclick="App.toggleFollow(${teacher.id})">
                                        <i class="fas ${isFollowing ? 'fa-check' : 'fa-plus'}"></i>
                                        ${isFollowing ? 'متابعة' : 'متابعة'}
                                    </button>
                                ` : ''}
                                <button class="channel-btn channel-btn-secondary" onclick="App.goHome()">
                                    <i class="fas fa-arrow-right"></i> رجوع
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            },
            
            // ========== لوحة تحكم الأستاذ ==========
            renderTeacherDashboard() {
                const teacher = this.teachers.find(t => t.id === this.currentUser.id);
                const teacherLessons = this.lessons.filter(l => l.teacherId === teacher.id);
                
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = `
                    <div class="welcome-card">
                        <h1>مرحباً بك أ. ${teacher.name} 👨‍🏫</h1>
                        <p>${teacher.bio}</p>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-content">
                                <div class="stat-value">${teacher.followers?.length || 0}</div>
                                <div class="stat-label">متابع</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-book"></i></div>
                            <div class="stat-content">
                                <div class="stat-value">${teacherLessons.length}</div>
                                <div class="stat-label">درس</div>
                            </div>
                        </div>
                    </div>
                `;
            },
            
            // ========== المصادقة ==========
            showAuthModal() {
                this.showModal(`
                    <h2 style="color: var(--primary); text-align: center;">مرحباً بك في تعلّم.ما</h2>
                    
                    <div class="user-type-selector">
                        <button class="user-type-btn ${this.selectedUserType === 'student' ? 'active' : ''}" 
                            onclick="App.selectUserType('student')">
                            <i class="fas fa-user-graduate"></i> تلميذ
                        </button>
                        <button class="user-type-btn ${this.selectedUserType === 'teacher' ? 'active' : ''}" 
                            onclick="App.selectUserType('teacher')">
                            <i class="fas fa-chalkboard-teacher"></i> أستاذ
                        </button>
                    </div>
                    
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="كلمة السر">
                    </div>
                    
                    <button class="submit-btn" onclick="App.handleLogin()">دخول</button>
                    <button class="nav-btn" style="width:100%; margin-top:1rem;" onclick="App.showRegisterForm()">تسجيل جديد</button>
                `);
            },
            
            showRegisterForm() {
                this.showModal(`
                    <h2 style="color: var(--primary); text-align: center;">تسجيل جديد</h2>
                    
                    <div class="form-group">
                        <input type="text" id="regName" placeholder="الاسم الكامل">
                    </div>
                    <div class="form-group">
                        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                    </div>
                    <div class="form-group">
                        <input type="password" id="regPassword" placeholder="كلمة السر">
                    </div>
                    
                    ${this.selectedUserType === 'teacher' ? `
                        <div class="form-group">
                            <input type="text" id="regSpecialty" placeholder="الاختصاص">
                        </div>
                        <div class="form-group">
                            <textarea id="regBio" rows="3" placeholder="نبذة عنك"></textarea>
                        </div>
                    ` : ''}
                    
                    <button class="submit-btn" onclick="App.handleRegister()">تسجيل</button>
                `);
            },
            
            selectUserType(type) {
                this.selectedUserType = type;
                document.querySelectorAll('.user-type-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            },
            
            handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                let user;
                if (this.selectedUserType === 'teacher') {
                    user = this.teachers.find(t => t.email === email && t.password === password);
                } else {
                    user = this.students.find(s => s.email === email && s.password === password);
                }
                
                if (user) {
                    this.currentUser = {
                        id: user.id,
                        name: user.name,
                        type: this.selectedUserType
                    };
                    this.saveAll();
                    this.closeModal();
                    this.render();
                    this.toast('مرحباً بك');
                } else {
                    this.toast('خطأ في البريد أو كلمة السر', 'error');
                }
            },
            
            handleRegister() {
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                
                if (!name || !email || !password) {
                    this.toast('الرجاء ملء جميع الحقول', 'error');
                    return;
                }
                
                if (this.selectedUserType === 'teacher') {
                    if (this.teachers.find(t => t.email === email)) {
                        this.toast('البريد موجود مسبقاً', 'error');
                        return;
                    }
                    
                    const specialty = document.getElementById('regSpecialty')?.value || 'أستاذ';
                    const bio = document.getElementById('regBio')?.value || 'أستاذ جديد';
                    
                    const newTeacher = {
                        id: this.teachers.length + 1,
                        name: name,
                        email: email,
                        password: password,
                        specialty: specialty,
                        bio: bio,
                        avatar: this.getRandomAvatar(),
                        rating: 0,
                        followers: [],
                        subjects: [],
                        levels: []
                    };
                    
                    this.teachers.push(newTeacher);
                    this.currentUser = { id: newTeacher.id, name: name, type: 'teacher' };
                    
                } else {
                    if (this.students.find(s => s.email === email)) {
                        this.toast('البريد موجود مسبقاً', 'error');
                        return;
                    }
                    
                    const newStudent = {
                        id: this.students.length + 1,
                        name: name,
                        email: email,
                        password: password,
                        level: 'bac1',
                        following: [],
                        savedLessons: [],
                        points: 0,
                        streak: 0
                    };
                    
                    this.students.push(newStudent);
                    this.currentUser = { id: newStudent.id, name: name, type: 'student' };
                }
                
                this.saveAll();
                this.closeModal();
                this.render();
                this.toast('تم التسجيل بنجاح');
            },
            
            logout() {
                this.currentUser = null;
                this.viewingChannel = null;
                localStorage.removeItem('currentUser');
                this.render();
                this.toast('تم تسجيل الخروج');
            },
            
            goHome() {
                this.viewingChannel = null;
                this.render();
            },
            
            // ========== تهيئة الخلفية ==========
            initAnimatedBg() {
                const bg = document.getElementById('animatedBg');
                for (let i = 0; i < 20; i++) {
                    const span = document.createElement('span');
                    span.style.left = Math.random() * 100 + '%';
                    span.style.width = Math.random() * 20 + 5 + 'px';
                    span.style.height = span.style.width;
                    span.style.animationDuration = Math.random() * 20 + 10 + 's';
                    span.style.animationDelay = Math.random() * 10 + 's';
                    bg.appendChild(span);
                }
            },
            
            // ========== تهيئة التطبيق ==========
            init() {
                this.loadData();
                this.initSampleData();
                this.initAnimatedBg();
                this.render();
                
                window.onclick = (event) => {
                    const modal = document.getElementById('modal');
                    if (event.target === modal) this.closeModal();
                };
            }
        };

        // ========== تشغيل التطبيق ==========
        App.init();
    </script>
</body>
</html>
